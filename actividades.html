<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades - Jorge</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contenedor { max-width: 600px; width: 100%; text-align: left; }
        h1 { color: #bb86fc; text-align: center; margin-bottom: 30px; }
        
        /* Entrada de nuevas tareas */
        .input-grupo { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { 
            flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid #333; 
            background: #1e1e1e; color: white; outline: none; font-size: 1rem;
        }
        .btn-add { 
            background: #03dac6; color: black; border: none; padding: 0 25px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-add:hover { background: #bb86fc; transform: scale(1.05); }

        /* Estilo de la lista */
        .lista { list-style: none; padding: 0; }
        .item { 
            background: #1e1e1e; padding: 15px; border-radius: 12px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 5px solid #bb86fc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item.completado { opacity: 0.4; border-left-color: #4caf50; }
        .item.completado span { text-decoration: line-through; }

        .btn-acciones { display: flex; gap: 10px; }
        .btn-check { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #03dac6; }
        .btn-delete { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #cf6679; }

        .boton-volver { display: block; margin-top: 40px; color: #888; text-decoration: none; text-align: center; font-weight: bold; }
        .boton-volver:hover { color: white; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>🏃 Lista de Actividades</h1>

        <div class="input-grupo">
            <input type="text" id="nuevaTarea" placeholder="¿Qué hay que hacer, Jorge?">
            <button class="btn-add" onclick="agregarTarea()">AÑADIR</button>
        </div>

        <ul id="listaActividades" class="lista">
            <!-- Tareas de ejemplo -->
            <li class="item">
                <span>Revisar documentos garajes</span>
                <div class="btn-acciones">
                    <button class="btn-check" onclick="marcar(this)">✔</button>
                    <button class="btn-delete" onclick="borrar(this)">🗑</button>
                </div>
            </li>
            <li class="item">
                <span>Comprar suministros</span>
                <div class="btn-acciones">
                    <button class="btn-check" onclick="marcar(this)">✔</button>
                    <button class="btn-delete" onclick="borrar(this)">🗑</button>
                </div>
            </li>
        </ul>

        <a href="index.html" class="boton-volver">← Volver al Portal Principal</a>
    </div>

    <script>
        // Función para añadir tareas
        function agregarTarea() {
            const input = document.getElementById('nuevaTarea');
            const texto = input.value.trim();
            
            if (texto !== "") {
                const lista = document.getElementById('listaActividades');
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <span>${texto}</span>
                    <div class="btn-acciones">
                        <button class="btn-check" onclick="marcar(this)">✔</button>
                        <button class="btn-delete" onclick="borrar(this)">🗑</button>
                    </div>
                `;
                lista.appendChild(li);
                input.value = "";
            }
        }

        // Función para marcar como completada
        function marcar(btn) {
            const item = btn.closest('.item');
            item.classList.toggle('completado');
        }

        // Función para borrar de la lista
        function borrar(btn) {
            const item = btn.closest('.item');
            item.style.opacity = '0';
            setTimeout(() => item.remove(), 300);
        }

        // Permitir añadir con la tecla Enter
        document.getElementById('nuevaTarea').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                agregarTarea();
            }
        });
    </script>
</body>
</html>
