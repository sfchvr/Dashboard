<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Jorge</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #bb86fc; margin-bottom: 30px; }

        .layout-agenda {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* Contenedor del Calendario */
        .calendario-container {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 10px;
            border: 1px solid #333;
            height: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Iframe ajustado para llenar el contenedor */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        /* Panel Lateral de Actividades */
        .panel-actividades {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 { color: #03dac6; font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .evento {
            background: #252525;
            padding: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #bb86fc;
            border-radius: 6px;
            transition: transform 0.2s;
        }

        .evento:hover { transform: scale(1.02); }
        .evento span { display: block; color: #03dac6; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        .evento strong { display: block; font-size: 1rem; color: #e0e0e0; }

        .trabajo { border-left-color: #03dac6; }
        .quedada { border-left-color: #bb86fc; }
        .fiesta { border-left-color: #f44336; }

        .boton-volver {
            margin-top: 40px;
            color: #888;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .boton-volver:hover { color: white; text-decoration: underline; }

        @media (max-width: 900px) {
            .layout-agenda { grid-template-columns: 1fr; }
            .calendario-container { height: 400px; }
        }
    </style>
</head>
<body>

    <h1>📅 Agenda de Vida - Jorge</h1>

    <div class="layout-agenda">
        <div class="calendario-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=jorge.orob%40gmail.com&ctz=Europe%2FAmsterdam" style="border: 0" frameborder="0" scrolling="no"></iframe>
        </div>

        <div class="panel-actividades">
            <h2>Próximas Citas</h2>
            
            <div class="evento trabajo">
                <span>Lunes a Viernes | 09:00 - 18:00</span>
                <strong>💼 Trabajo</strong>
            </div>

            <div class="evento quedada">
                <span>Miércoles | 20:00</span>
                <strong>🍻 Quedada con amigos</strong>
            </div>

            <div class="evento fiesta">
                <span>Viernes Noche</span>
                <strong>🎉 Fiesta en Occo</strong>
            </div>

            <div class="evento">
                <span>Sábado | 11:00</span>
                <strong>🎾 Deporte / Ocio</strong>
            </div>
        </div>
    </div>

    <a href="index.html" class="boton-volver">← Volver al Portal de Jorge</a>

</body>
</html>
