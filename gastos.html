<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos - Jorge</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; margin: 0; }
        .contenedor-gastos { max-width: 1100px; margin: auto; text-align: left; padding-top: 20px; }
        h1 { color: #bb86fc; font-size: 1.8rem; margin-bottom: 20px; }

        /* Selector de mes */
        .selector-mes { margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        select { background: #1e1e1e; color: white; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 1rem; cursor: pointer; }

        .boton-registro { 
            display: block; width: 100%; padding: 18px; background-color: #03dac6; 
            color: black; text-align: center; border-radius: 12px; font-weight: bold; 
            text-decoration: none; margin-bottom: 30px; transition: 0.3s; box-sizing: border-box;
        }
        .boton-registro:hover { background-color: #bb86fc; transform: translateY(-3px); }

        .resumen { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .tarjeta { background: #1e1e1e; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .tarjeta h3 { margin: 0; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .tarjeta p { font-size: 1.6rem; margin: 15px 0 0 0; font-weight: bold; color: #03dac6; }
        .tarjeta p.saldo { color: #bb86fc; }
        .tarjeta p.ingreso { color: #4caf50; }

        .boton-volver { display: inline-block; margin-top: 40px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .boton-volver:hover { color: white; text-decoration: underline; }
        #mensaje-estado { color: #888; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="contenedor-gastos">
        <h1>📊 Control de Gastos</h1>
        
        <div class="selector-mes">
            <label for="mes-select">Selecciona el mes:</label>
            <select id="mes-select" onchange="actualizarDatos()">
                <option value="Mes Actual" selected>Mes Actual</option>
                <option value="Enero">Enero</option>
                <option value="Febrero">Febrero</option>
                <option value="Marzo">Marzo</option>
                <option value="Abril">Abril</option>
                <option value="Mayo">Mayo</option>
                <option value="Junio">Junio</option>
                <option value="Julio">Julio</option>
                <option value="Agosto">Agosto</option>
                <option value="Septiembre">Septiembre</option>
                <option value="Octubre">Octubre</option>
                <option value="Noviembre">Noviembre</option>
                <option value="Diciembre">Diciembre</option>
                <option value="Balance anual">Balance anual</option>
            </select>
        </div>
        
        <a href="https://docs.google.com/spreadsheets/d/1KZ1tqMvFPWKgGg0sheADgu7-MU2GD9gDd2BYTW8n2Bw/edit" target="_blank" class="boton-registro">📝 EDITAR EN GOOGLE SHEETS</a>
        
        <div class="resumen">
            <div class="tarjeta"><h3>Ingresos</h3><p id="ingresos-mes" class="ingreso">0,00 €</p></div>
            <div class="tarjeta"><h3>Gastos</h3><p id="gasto-actual">0,00 €</p></div>
            <div class="tarjeta"><h3>Balance</h3><p id="balance-mes">0,00 €</p></div>
            <div class="tarjeta"><h3>Saldo Real</h3><p id="saldo-real" class="saldo">0,00 €</p></div>
        </div>

        <p id="mensaje-estado">Selecciona un mes para cargar datos...</p>

        <a href="index.html" class="boton-volver">← Volver al Portal Principal</a>
    </div>

    <script>
        const spreadsheetId = "1KZ1tqMvFPWKgGg0sheADgu7-MU2GD9gDd2BYTW8n2Bw";
        
        async function actualizarDatos() {
            const mes = document.getElementById('mes-select').value;
            const estado = document.getElementById('mensaje-estado');
            estado.innerText = `Cargando datos de ${mes}...`;

            // Nota: Para que esto funcione, Google Sheets debe tener las pestañas nombradas exactamente así
            const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(mes)}&t=${Date.now()}`;

            try {
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const json = JSON.parse(texto.substring(texto.indexOf('{'), texto.lastIndexOf('}') + 1));
                const filas = json.table.rows;

                const extraerDato = (f, c) => {
                    try {
                        if (!filas[f] || !filas[f].c[c]) return 0;
                        const celda = filas[f].c[c];
                        let val = celda.v !== null ? celda.v : (celda.f ? celda.f : 0);
                        if (typeof val === 'number') return val;
                        let limpio = val.toString().replace(/[^\d.,-]/g, '').replace(',', '.');
                        return parseFloat(limpio) || 0;
                    } catch(e) { return 0; }
                };

                const ingresos = extraerDato(2, 6) || extraerDato(1, 6) || extraerDato(3, 6);
                const gastos = extraerDato(0, 6) || extraerDato(2, 6) || extraerDato(1, 6);
                const balance = extraerDato(4, 6) || extraerDato(3, 6) || extraerDato(5, 6);
                const saldo = extraerDato(1, 7) || extraerDato(0, 7) || extraerDato(2, 7);

                const moneda = (n) => n.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });

                document.getElementById('ingresos-mes').innerText = moneda(ingresos);
                document.getElementById('gasto-actual').innerText = moneda(gastos);
                
                const elBalance = document.getElementById('balance-mes');
                elBalance.innerText = moneda(balance);
                elBalance.style.color = balance < 0 ? "#ff4444" : "#03dac6";
                
                document.getElementById('saldo-real').innerText = moneda(saldo);
                estado.innerText = `✅ Datos de ${mes} cargados`;
                estado.style.color = "#03dac6";
            } catch (e) {
                estado.innerText = "⚠️ Error: Asegúrate de que la pestaña existe en tu Excel.";
                estado.style.color = "#ff4444";
            }
        }

        // Cargar al iniciar
        actualizarDatos();
    </script>
</body>
</html>
