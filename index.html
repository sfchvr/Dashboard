<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Financiero - Jorge</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Widget Mundial */
        .widget-mundial {
            position: absolute; top: 30px; right: 30px;
            background: #1e1e1e; border: 1px solid #333;
            padding: 20px; border-radius: 20px;
            text-align: center; width: 200px;
        }
        .widget-mundial span { font-size: 0.7rem; color: #bb86fc; text-transform: uppercase; letter-spacing: 1px; }
        .widget-mundial p { margin: 8px 0 0 0; font-weight: 600; font-size: 1rem; }

        /* Reloj y Fecha */
        #reloj-contenedor { text-align: center; margin-bottom: 40px; }
        #reloj { font-size: 4.5rem; font-weight: 200; color: #03dac6; margin: 0; }
        #fecha { font-size: 1.1rem; color: #888; margin-bottom: 5px; }

        /* Botón Único de Gastos */
        .boton-gastos {
            background-color: #bb86fc;
            color: #000;
            padding: 25px 60px;
            border-radius: 20px;
            font-size: 1.5rem;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(187, 134, 252, 0.2);
        }
        .boton-gastos:hover { transform: scale(1.05); background-color: #03dac6; }

        /* Accesos rápidos minimalistas */
        .accesos-rapidos { margin-top: 60px; display: flex; gap: 40px; }
        .link-rapido { color: #555; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .link-rapido:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="widget-mundial" id="widget-mundial">
        <span>Mundial 2026</span>
        <p id="partido-rival">Cargando...</p>
        <p id="partido-info" style="font-size: 0.7rem; opacity: 0.6;"></p>
    </div>

    <div id="reloj-contenedor">
        <p id="fecha">-- / -- / ----</p>
        <p id="reloj">00:00:00</p>
    </div>

    <a href="gastos.html" class="boton-gastos">
        <span>📊</span> ACCEDER A GASTOS
    </a>

    <div class="accesos-rapidos">
        <a href="https://mail.google.com" target="_blank" class="link-rapido">Correo</a>
        <a href="https://www.google.es/maps" target="_blank" class="link-rapido">Maps</a>
    </div>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').textContent = ahora.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('fecha').textContent = ahora.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        async function actualizarWidget() {
            const gidMundial = "431024044";
            const spreadsheetId = "1KZ1tqMvFPWKgGg0sheADgu7-MU2GD9gDd2BYTW8n2Bw";
            const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gidMundial}&t=${Date.now()}`;
            
            try {
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const json = JSON.parse(texto.substring(texto.indexOf('{'), texto.lastIndexOf('}') + 1));
                const filas = json.table.rows;
                const rival = filas[0].c[0] ? (filas[0].c[0].f || filas[0].c[0].v) : "Sin partido";
                const info = filas[0].c[1] ? (filas[0].c[1].f || filas[0].c[1].v) : "";
                
                document.getElementById('partido-rival').innerText = rival;
                document.getElementById('partido-info').innerText = info;
            } catch (e) { document.getElementById('partido-rival').innerText = "Error"; }
        }
        actualizarWidget();
    </script>
</body>
</html>
