<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Privado - Jorge</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --accent-purple: #bb86fc;
            --accent-teal: #03dac6;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --border-radius: 16px;
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }

        /* Widget Sevilla (Estilo Premium Card) */
        .widget-sevilla {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 250px;
            text-align: left;
        }
        .widget-sevilla span { font-size: 0.75rem; color: var(--accent-teal); text-transform: uppercase; letter-spacing: 1px; }
        .widget-sevilla p { margin: 8px 0 0 0; font-weight: 600; font-size: 1.1rem; }
        .widget-sevilla .sub-info { font-size: 0.85rem; color: var(--text-muted); font-weight: normal; }

        /* Reloj */
        #reloj-contenedor { text-align: center; margin-bottom: 40px; }
        #reloj { font-size: 5rem; font-weight: 700; color: var(--accent-purple); margin: 0; line-height: 1; letter-spacing: -2px; }
        #fecha { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }

        h1 { font-size: 1.5rem; font-weight: 300; margin: 0 0 30px 0; color: var(--text-muted); }
        
        .contenedor-botones {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }

        .boton-principal {
            background-color: var(--bg-card);
            color: var(--text-main);
            padding: 25px; 
            border-radius: var(--border-radius);
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .boton-principal:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent-purple);
            background-color: #252525;
        }

        .icon { font-size: 2rem; margin-bottom: 10px; }

        /* Accesos Directos */
        .accesos-rapidos {
            display: flex;
            gap: 30px;
            margin-top: 50px;
        }
        .link-rapido {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .link-rapido:hover { color: var(--accent-teal); }
    </style>
</head>
<body>

    <div class="widget-sevilla" id="widget-mundial">
        <span id="label-evento">Cargando...</span>
        <p id="partido-rival">Conectando...</p>
        <p class="sub-info" id="partido-info">...</p>
    </div>

    <div id="reloj-contenedor">
        <p id="fecha">-- / -- / ----</p>
        <p id="reloj">00:00:00</p>
    </div>

    <h1>Bienvenido, Jorge</h1>

    <div class="contenedor-botones">
        <a href="cenas.html" class="boton-principal"><span class="icon">🍴</span> Cenas</a>
        <a href="gastos.html" class="boton-principal"><span class="icon">📊</span> Gastos</a>
        <a href="agenda.html" class="boton-principal"><span class="icon">📅</span> Agenda</a>
        <a href="actividades.html" class="boton-principal"><span class="icon">🏃</span> Actividades</a>
    </div>

    <div class="accesos-rapidos">
        <a href="https://mail.google.com" target="_blank" class="link-rapido">Correo</a>
        <a href="https://www.marca.com" target="_blank" class="link-rapido">MARCA</a>
        <a href="https://www.google.es/maps" target="_blank" class="link-rapido">Maps</a>
    </div>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').textContent = ahora.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
            const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('fecha').textContent = ahora.toLocaleDateString('es-ES', opciones);
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        async function actualizarWidget() {
            const gidMundial = "431024044";
            const spreadsheetId = "1KZ1tqMvFPWKgGg0sheADgu7-MU2GD9gDd2BYTW8n2Bw";
            const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gidMundial}&t=${Date.now()}`;
            
            try {
                const respuesta = await fetch(url);
                const texto = await respuesta.text();
                const json = JSON.parse(texto.substring(texto.indexOf('{'), texto.lastIndexOf('}') + 1));
                const filas = json.table.rows;
                
                const rival = filas[0].c[0] ? (filas[0].c[0].f || filas[0].c[0].v) : "Sin partido";
                const info = filas[0].c[1] ? (filas[0].c[1].f || filas[0].c[1].v) : "";
                
                document.getElementById('label-evento').innerText = "Próximo Partido";
                document.getElementById('partido-rival').innerText = rival;
                document.getElementById('partido-info').innerText = info;
            } catch (e) {
                document.getElementById('partido-rival').innerText = "Error de carga";
            }
        }
        actualizarWidget();
    </script>
</body>
</html>
