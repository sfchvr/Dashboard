<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Privado - Jorge</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Widget Mundial */
        .widget-sevilla {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f44336 0%, #b71c1c 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 230px;
            text-align: center;
            border: 2px solid #ffffff33;
        }
        .widget-sevilla span { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
        .widget-sevilla p { margin: 5px 0; font-weight: bold; font-size: 1rem; color: white; }

        /* Reloj y Tiempo */
        #reloj-contenedor { text-align: center; margin-bottom: 20px; }
        #reloj { font-size: 4rem; font-weight: bold; color: #03dac6; margin: 0; line-height: 1.1; }
        #fecha { font-size: 1rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        #clima { color: #ffb74d; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

        h1 { color: #bb86fc; font-size: 1.8rem; margin: 10px 0 5px 0; }
        
        .contenedor-botones {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 90%;
            margin-bottom: 30px;
        }

        .boton-principal {
            color: #000; 
            padding: 18px; 
            border-radius: 15px;
            font-size: 1rem; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .boton-principal:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .btn-cenas { background-color: #03dac6; } 
        .btn-gastos { background-color: #cf6679; } 
        .btn-agenda { background-color: #ffb74d; } 
        .btn-actividades { background-color: #bb86fc; } 

        .icon { font-size: 1.6rem; margin-bottom: 5px; }

        /* Accesos Directos */
        .accesos-rapidos {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .link-rapido {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .link-rapido:hover { color: white; }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(187, 134, 252, 0.03) 0%, rgba(18, 18, 18, 0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="widget-sevilla" id="widget-mundial">
        <span id="label-evento">Cargando...</span>
        <p id="partido-rival">Conectando...</p>
        <p style="font-size: 0.8rem; font-weight: normal;" id="partido-info">...</p>
    </div>

    <div id="reloj-contenedor">
        <p id="fecha">-- / -- / ----</p>
        <p id="reloj">00:00:00</p>
        <div id="clima">☀️ Sevilla: <span id="temp-valor">--</span>°C</div>
    </div>

    <h1>Bienvenido, Jorge</h1>

    <div class="contenedor-botones">
        <a href="cenas.html" class="boton-principal btn-cenas"><span class="icon">🍴</span> Cenas</a>
        <a href="gastos.html" class="boton-principal btn-gastos"><span class="icon">📊</span> Gastos</a>
        <a href="agenda.html" class="boton-principal btn-agenda"><span class="icon">📅</span> Agenda</a>
        <a href="actividades.html" class="boton-principal btn-actividades"><span class="icon">🏃</span> Actividades</a>
    </div>
